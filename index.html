      <h1>Velox House — launch lead-gen campaigns from a single prompt</h1>
      <p>
        Velox House is the AI outreach platform you run from a single prompt. Describe
        your ideal customer and Velox AI builds the whole campaign, finds and verifies
        matching decision-makers, researches each one, writes personalised email and
        LinkedIn messages, and sends them every day on autopilot — from your own inbox,
        tracking every open, reply and meeting. The fastest way to generate leads
        without lifting a finger. Every plan starts with a 21-day free trial. Paid plans
        from £19.99/month.
      </p>
      <h2>What Velox House does</h2>
      <ul>
        <li><strong>Velox AI (campaigns from a prompt)</strong> — describe who you want to reach; Velox AI plans the entire campaign, finds and verifies the leads, writes the email and LinkedIn messages, and — once you approve — launches and sends across both channels on autopilot. Set a goal like "50 replies a week" and it keeps finding and sending daily until it's hit. Nothing else lets you launch outbound from a single prompt.</li>
        <li><strong>AI Discovery</strong> — describe your ideal customer and the AI query-planner expands it into many targeted searches, building a market of hundreds of companies, fit-scored and ranked, with verified email discovery. Search companies or people by role, seniority, department, industry, size and location.</li>
        <li><strong>AI Copilot</strong> — app-wide AI guidance: dashboard next-best-actions, "explain my numbers" on analytics, one-click campaign autopsies, and inbox reply suggestions that read the objection and draft a response.</li>
        <li><strong>AI Research</strong> — every prospect researched automatically for pain points, angles and fit.</li>
        <li><strong>AI Messaging</strong> — personalised cold emails, LinkedIn notes and follow-ups written for you.</li>
        <li><strong>Sequences</strong> — multi-step email + LinkedIn follow-up, naturally paced and staggered, that runs from your own inbox and stops when they reply.</li>
        <li><strong>Pipeline &amp; Inbox</strong> — every reply and deal stage in one place.</li>
        <li><strong>Analytics &amp; Deliverability</strong> — track opens, replies and meetings with an AI read of the numbers; SPF/DKIM/DMARC checks and a pre-send spam checker keep your domain inbox-safe.</li>
      </ul>
      <h2>Pricing</h2>
      <ul>
        <li>Every plan starts with a <strong>21-day free trial</strong> — the full product, cancel any time before you're billed.</li>
        <li><strong>Starter</strong> — £19.99/mo: 300 contacts, 300 AI credits, unlimited email sending, 2 mailboxes. Email-only — LinkedIn from Growth up.</li>
        <li><strong>Growth</strong> — £49.99/mo: 1,000 contacts, 1,000 AI credits, 1 included LinkedIn seat, 3 seats, 5 mailboxes.</li>
        <li><strong>Scale</strong> — £79.99/mo: 1,750 contacts, 2,500 AI credits, 1 included LinkedIn seat, 5 seats, 10 mailboxes.</li>
        <li><strong>Agency</strong> — £179.99/mo: 4,000 contacts, 5,000 AI credits, 1 included LinkedIn seat, 10 seats, 25 mailboxes, priority support.</li>
        <li>Growth, Scale and Agency each include a LinkedIn seat (Starter is email-only). Add extra seats for £19.99/mo each.</li>
      </ul>
      <p>Sending is unlimited on every plan — emails go from your own connected mailbox (Google, Microsoft 365 or SMTP). No contract, cancel anytime.</p>
